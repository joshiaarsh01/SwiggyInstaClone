{% load static %}
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Register — SwiggyInstaClone</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700;800&family=Work+Sans:wght@400;500&family=Space+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'store/style.css' %}">
</head>
<body>

    <nav class="navbar">
       <a href="{% url 'home' %}" class="logo">
        <img src="{% static 'store/image/logo.png' %}"
             alt="Swiggy InstaClone"
             class="logo-img">
    </a>
    </nav>

    <section class="hero">
        <h1>Create <em>Account</em></h1>
    </section>

    <div class="checkout-wrap">
        {% if messages %}
            {% for message in messages %}
                <p style="color: var(--chili); margin-bottom: 10px;">{{ message }}</p>
            {% endfor %}
        {% endif %}

        <form method="POST" class="checkout-form" id="register-form">
            {% csrf_token %}
            <label>Full Name</label>
            <input type="text" name="name" required>
            <label>Phone Number</label>
            <input type="text" name="number" required>
            <label>Email</label>
            <input type="email" name="email" required>
            <label>Password</label>
            <input type="password" name="password" required>
            <button type="submit" class="order-now-btn">Register</button>
        </form>
        <p style="margin-top: 16px; color: rgba(251,243,231,0.7);">
            Already have an account? <a href="{% url 'login' %}" class="back-link">Log in</a>
        </p>
    </div>

</body>
</html>
